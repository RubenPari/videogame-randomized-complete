services:
  backend:
    build:
      context: ./videogame-randomized-back
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # GCP Project ID will be loaded from appsettings or GOOGLE_APPLICATION_CREDENTIALS for local run.
      # Se si vuole forzare qui:
      # - GoogleCloud__ProjectId=videogame-randomized-rilm8

  frontend:
    build:
      context: ./videogame-randomized
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./videogame-randomized:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend
