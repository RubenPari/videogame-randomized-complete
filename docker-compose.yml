services:
  mysql:
    image: mysql:8.0
    container_name: videogames_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: videogames
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./videogame-randomized-back
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DB_HOST=mysql
      - DB_NAME=videogames
      - DB_USER=root
      - DB_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=videogame-randomizer
      - JWT_AUDIENCE=videogame-randomizer-frontend
      - JWT_EXPIRATION_MINUTES=1440
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL}
      - EMAIL_FROM_NAME=VideoGame Randomizer
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./videogame-randomized
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./videogame-randomized:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  mysql_data:
