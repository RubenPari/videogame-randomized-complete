services:
  backend:
    build:
      context: ./videogame-randomized-back
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=mongodb://mongodb:27017/VideogameDB
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./videogame-randomized
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./videogame-randomized:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

volumes:
  db-data:
